  .choice-btn.correct { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
  .choice-btn.wrong { border-color: #D85A30; background: #FAECE7; color: #4A1B0C; }

    background: #ede9ff; color: #534AB7;

  .choice-btn.wrong .choice-letter { background: #D85A30; color: white; }

      { char: 1, text: "ふっふっふ、今回のSummitでDatabricksがそれを解決する2つの新アーキテクチャを発表してたよ！" }
    ],
    question: "今回のSummitで発表された、新コンピュートエンジン「Reyden」搭載のリアルタイム分析基盤の名称は？",
    choices: [
      { text: "Lakehouse//RT — Reyden搭載のリアルタイム分析基盤", correct: true },
      { text: "Delta Live Tables 2.0 — パイプラインの新バージョン", correct: false },
      { text: "Structured Streaming Pro — Spark Streamingの後継", correct: false },
      { text: "Photon RT — Photonエンジンのリアルタイム拡張", correct: false }
    ],
    feedback: {
      correct: "🎉 正解！ Lakehouse//RTは新コンピュートエンジン「Reyden」搭載のリアルタイム分析基盤です！同時に「LTAP」も発表され、単一のオープンフォーマットストレージでトランザクション＋分析を統合するアーキテクチャが示されました。",
      wrong: "😿 不正解... 正解は「Lakehouse//RT」です。新エンジン「Reyden」を搭載したリアルタイム分析基盤です。LTAPというトランザクション＋分析統合アーキテクチャとセットで発表されました！"
    },
    knowledge: "💡 LTAPは「Lake Transactional/Analytical Processing」の略！従来別々だったOLTP（トランザクション処理）とOLAP（分析処理）を単一オープンフォーマット上で統合する新アーキテクチャです。"
  }
];

let currentScene = 0;
let score = 0;
let answered = false;

function getApp() { return document.getElementById('app'); }

function getAvatarSVG(type) {
  return type === 'cat' ? CAT_SVG : OWL_SVG;
}

function renderProgress() {
  const pct = (currentScene / scenarios.length) * 100;
  return `
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="badge badge-scene">📖 シーン ${Math.min(currentScene + 1, scenarios.length)} / ${scenarios.length}</span>
        <span class="badge badge-score">⭐ ${score} 正解</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function renderScene() {
  const s = scenarios[currentScene];
  answered = false;

  let dialogueHTML = s.dialogue.map(d => {
    const ch = s.characters[d.char];
    const isOwl = ch.type === 'owl';
    return `
      <div class="speaker-row${isOwl ? ' reverse' : ''}">
        <div class="avatar-wrap">
          ${getAvatarSVG(ch.type)}
          <span class="char-name">${ch.name.split('（')[0]}</span>
        </div>
        <div class="bubble bubble-${ch.type}">${d.text}</div>
      </div>`;
  }).join('');

  const letters = ['A', 'B', 'C', 'D'];
  let choicesHTML = s.choices.map((c, i) =>
    `<button class="choice-btn" id="choice-${i}" onclick="handleChoice(${i})">
      <span class="choice-letter">${letters[i]}</span>
      <span>${c.text}</span>
    </button>`
  ).join('');

  getApp().innerHTML = `
    ${renderProgress()}
    <div class="scene-card">
      <div class="topic-tag">📌 ${s.topic}</div>
      <div class="scene-title">${s.title}</div>
      ${dialogueHTML}
    </div>
    <div class="scene-card">
      <div class="question-box">🤔 ${s.question}</div>
      <div id="choices-area">${choicesHTML}</div>
      <div id="feedback-area"></div>
    </div>`;
}

function handleChoice(idx) {
  if (answered) return;
  answered = true;
  const s = scenarios[currentScene];
  const correct = s.choices[idx].correct;
  if (correct) score++;

  s.choices.forEach((c, i) => {
    const btn = document.getElementById('choice-' + i);
    btn.disabled = true;
    if (c.correct) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  const isLast = currentScene === scenarios.length - 1;
  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback-box ${correct ? 'feedback-correct' : 'feedback-wrong'}">
      ${correct ? s.feedback.correct : s.feedback.wrong}
    </div>
    <div class="knowledge-card">${s.knowledge}</div>
    <button class="next-btn" onclick="${isLast ? 'showResult()' : 'nextScene()'}">${isLast ? '結果を見る 🎊' : '次のシーンへ →'}</button>`;
}

function nextScene() {
  currentScene++;
  renderScene();
}

function showResult() {
  const total = scenarios.length;
  const pct = Math.round((score / total) * 100);
  let msg, color, emoji;
  if (score === total) { msg = "パーフェクト！ Databricksの最新発表を完全に理解しているニャ！"; color = "#085041"; emoji = "🏆"; }
  else if (score >= 3) { msg = "よくできました！ 主要な発表をしっかり押さえているよ！"; color = "#0F6E56"; emoji = "🎉"; }
  else { msg = "もう一度チャレンジして、発表内容を復習しよう！"; color = "#993C1D"; emoji = "📚"; }

  const reviewHTML = scenarios.map(s => `
    <div class="review-row">
      <span class="topic-tag" style="flex-shrink:0;">${s.topic}</span>
      <span class="review-label">${s.choices.find(c => c.correct).text}</span>
    </div>`).join('');

  getApp().innerHTML = `
    <div class="scene-card" style="text-align:center;padding:2rem 1.5rem;">
      <div style="display:flex;justify-content:center;align-items:flex-end;gap:8px;margin-bottom:0.75rem;">
        ${CAT_SVG}${OWL_SVG}
      </div>
      <div style="font-size:36px;margin-bottom:0.25rem;">${emoji}</div>
      <div class="result-title">ゲームクリア！</div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-num" style="color:#534AB7;">${score}</div>
          <div class="stat-lbl">正解数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:#888;">${total}</div>
          <div class="stat-lbl">総問題数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:${color};">${pct}%</div>
          <div class="stat-lbl">正答率</div>
        </div>
      </div>
      <div style="font-size:14px;font-weight:700;color:${color};padding:0.75rem 1rem;background:#f8f6ff;border-radius:12px;">${msg}</div>
    </div>
    <div class="scene-card">
      <div style="font-size:13px;font-weight:700;color:#888;margin-bottom:0.75rem;">📝 今回学んだ発表内容まとめ</div>
      ${reviewHTML}
    </div>
    <button class="restart-btn" onclick="restartGame()">🔄 もう一度挑戦する</button>`;
}

function restartGame() {
  currentScene = 0;
  score = 0;
  answered = false;
  renderScene();
}

renderScene();
</script>
</body>
</html>
